<!doctype html>
<html lang="it">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tombola</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<link rel="icon" href="assets/img/EPICODE-pitto-color.png" />
		<link rel="stylesheet" type="text/css" href="assets/css/style.css" />
	</head>
	<body>
		<header class="container-fluid bg-dark text-light text-center p-3">
			<h1>TOMBOLA</h1>
		</header>

		<div class="container text-center">
			<p id="visual" class="m-3">&nbsp;</p>
			<h2 id="number" class="m-3">&nbsp;</h2>
			<button
				type="button"
				id="extract"
				class="btn btn-success border border-2 border-black rounded-2 p-3 w-25 shadow"
			>
				Estrai numero
			</button>
			<button
				type="button"
				id="start"
				class="btn btn-danger border border-2 border-black rounded-2 p-3 w-25 shadow m-3"
				disabled
			>
				Ricomincia
			</button>
			<h3 class="m-3">Cronologia</h3>
			<p id="cron" class="m-3">&nbsp;</p>
			<h3 class="m-3">Tabellone</h3>
		</div>

		<div class="container" id="board"></div>

		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
			crossorigin="anonymous"
		></script>
		<script src="assets/js/script.js"></script>
	</body>
</html>
